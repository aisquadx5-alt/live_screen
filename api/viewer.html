<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24/7 Live Screen Share Viewer</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --accent-hover: #0284c7;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 24px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 1100px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 16px 24px; border-radius: 12px; border: 1px solid var(--border); }
    h1 { font-size: 1.25rem; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    .controls { display: flex; gap: 12px; align-items: center; }
    input[type="text"] { background: #090d16; border: 1px solid var(--border); color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
    button { background: var(--accent); color: #0f172a; font-weight: 600; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: var(--accent-hover); }
    .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; display: flex; justify-content: center; align-items: center; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .placeholder { position: absolute; text-align: center; color: var(--text-muted); }
    .status-bar { display: flex; gap: 16px; font-size: 0.85rem; color: var(--text-muted); background: var(--card); padding: 12px 20px; border-radius: 8px; border: 1px solid var(--border); }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; background: #334155; color: #fff; }
    .badge.connected { background: #10b981; color: #000; }
    .badge.connecting { background: #f59e0b; color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📺 24/7 Live Screen Viewer</h1>
      <div class="controls">
        <input type="text" id="roomId" placeholder="Enter Room ID" />
        <button id="connectBtn">Connect Stream</button>
      </div>
    </header>

    <div class="video-container">
      <div class="placeholder" id="placeholder">
        <p style="font-size: 1.2rem; margin-bottom: 8px;">Waiting for stream signal...</p>
        <p style="font-size: 0.9rem;">Enter the Room ID displayed on your Android Screen Share app and click Connect.</p>
      </div>
      <video id="remoteVideo" autoplay playsinline controls></video>
    </div>

    <div class="status-bar">
      <div>Status: <span id="statusBadge" class="badge">Disconnected</span></div>
      <div>Peer Connection: <span id="iceState">Idle</span></div>
      <div>Last Signal: <span id="lastSignal">None</span></div>
    </div>
  </div>

  <script>
    let peerConnection = null;
    let pollInterval = null;
    let hasReceivedOffer = false;
    let processedCandidates = new Set();
    let lastOfferSdp = null;  // Track offer SDP to detect reconnection
    let currentRoomId = null;
    const roomIdInput = document.getElementById('roomId');
    const connectBtn = document.getElementById('connectBtn');
    const remoteVideo = document.getElementById('remoteVideo');
    const placeholder = document.getElementById('placeholder');
    const statusBadge = document.getElementById('statusBadge');
    const iceState = document.getElementById('iceState');
    const lastSignal = document.getElementById('lastSignal');

    const configuration = {
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };

    connectBtn.addEventListener('click', () => {
      const roomId = roomIdInput.value.trim().toUpperCase();
      if (!roomId) {
        alert('Please enter a valid Room ID');
        return;
      }
      startViewerSession(roomId);
    });

    function createPeerConnection(roomId) {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }

      const pc = new RTCPeerConnection(configuration);

      pc.ontrack = (event) => {
        if (event.streams && event.streams[0]) {
          remoteVideo.srcObject = event.streams[0];
          placeholder.style.display = 'none';
          statusBadge.textContent = 'LIVE';
          statusBadge.className = 'badge connected';
        }
      };

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          sendSignal(roomId, 'candidate', event.candidate);
        }
      };

      pc.oniceconnectionstatechange = () => {
        iceState.textContent = pc.iceConnectionState;
        if (pc.iceConnectionState === 'connected') {
          statusBadge.textContent = 'LIVE';
          statusBadge.className = 'badge connected';
        } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
          statusBadge.textContent = 'Reconnecting';
          statusBadge.className = 'badge connecting';
        }
      };

      peerConnection = pc;
      return pc;
    }

    async function startViewerSession(roomId) {
      if (pollInterval) clearInterval(pollInterval);
      
      hasReceivedOffer = false;
      processedCandidates.clear();
      lastOfferSdp = null;
      currentRoomId = roomId;

      statusBadge.textContent = 'Connecting...';
      statusBadge.className = 'badge connecting';

      createPeerConnection(roomId);

      pollInterval = setInterval(() => pollSignals(roomId), 1500);
      pollSignals(roomId);
    }

    async function sendSignal(roomId, type, payload) {
      try {
        const body = { roomId, senderType: 'viewer' };
        if (type === 'answer') body.sdp = payload;
        else if (type === 'candidate') body.candidate = payload;

        await fetch('/api/send-signal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
      } catch (err) {
        console.error('Failed to send signal:', err);
      }
    }

    async function pollSignals(roomId) {
      try {
        const res = await fetch(`/api/get-signal?roomId=${roomId}&requesterType=viewer`);
        const data = await res.json();
        
        if (data.success) {
          lastSignal.textContent = `Checked at ${new Date().toLocaleTimeString()}`;
          const pc = peerConnection;
          if (!pc) return;

          // Process SDP Offer - handles initial connect AND broadcaster reconnection
          if (data.sdp && data.sdp.type === 'offer') {
            const newOfferSdp = data.sdp.sdp;
            // Check if this is a NEW offer (different from the last one we processed)
            if (!hasReceivedOffer || (lastOfferSdp && newOfferSdp !== lastOfferSdp)) {
              if (hasReceivedOffer) {
                // Broadcaster reconnected! Reset and create fresh connection
                console.log('New offer detected - broadcaster reconnected, resetting...');
                statusBadge.textContent = 'Reconnecting';
                statusBadge.className = 'badge connecting';
                // Close old connection and create a new one
                const newPc = createPeerConnection(currentRoomId);
                hasReceivedOffer = false;
                processedCandidates.clear();
              }

              lastOfferSdp = newOfferSdp;
              hasReceivedOffer = true;
              await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
              const answer = await pc.createAnswer();
              await pc.setLocalDescription(answer);
              await sendSignal(currentRoomId, 'answer', answer);
            }
          }

          // Process ICE Candidates
          if (data.iceCandidates && data.iceCandidates.length > 0) {
            for (const cand of data.iceCandidates) {
               const candStr = JSON.stringify(cand);
               if (!processedCandidates.has(candStr)) {
                 processedCandidates.add(candStr);
                 try {
                   await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
                 } catch (e) {
                   // Ignore errors for candidates that arrive slightly before connection
                 }
               }
            }
          }
        }
      } catch (err) {
        console.error('Error polling signals:', err);
      }
    }
  </script>
</body>
</html>
